          description: Latitude of the driver's location.
          example: 30.4100166
        longitude:
          type: number
          description: Longitude of the driver's location.
          example: -75.24951
        time:
          type: string
          description: UTC timestamp of the driver at this location.
          format: date-time
      description: A single GPS trail data point.
