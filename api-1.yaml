  securitySchemes:
    Authorization:
      type: http
      description: >
        To access the NavPro API, you need a **Client Identifier** and a **JWT
        token**.


        **Option 1 — Self Service**


        Log in to the NavPro platform → API Docs module to create your
        credentials directly:

        https://navpro.qa-websit.truckerpath.com/setting/api-docs


        **Option 2 — Contact Us**


        Reach out to our Integration team at integrations@truckerpath.com with:
          - First and Last Name
          - Email
          - Company Name

        ### What is JWT?


        NavPro API uses JWT (JSON Web Token) for authentication — an open
        standard for access tokens that are cryptographically signed and
        self-verifiable without an authentication server.


        More information at https://jwt.io/


        Include the JWT as a Bearer token in every request:

        `Authorization: Bearer <your_jwt_token>`
      in: header
      scheme: bearer
      bearerFormat: JWT
