    PoiSiteInfo:
      type: object
      properties:
        site_id:
          type: integer
          description: The unique ID of the Last Mile. If this field is not specified, the
            default is the newly added last mile. It can be obtained through
            /api/poi/get.
          format: int32
          example: 52411
        latitude:
          type: number
          description: The latitude of the entrance or exit.
          format: double
          example: 33.768637172618696
        longitude:
          type: number
          description: The longitude of the entrance or exit.
          format: double
          example: -118.20210121482552
        path:
          type: array
          description: The last mile drag-and-drop route for directions. When passing last
            mile routes for entry or exit, it is necessary to specify the path
            type ROAD_PATH or OFF_GRID_PATH; otherwise, it will result in an
            error.
          example:
            - latitude: 33.767284073170934
              longitude: -118.20188556076194
            - latitude: 33.76726830662819
              longitude: -118.20294605499872
            - latitude: 33.7672529085608
              longitude: -118.20352649304614
          items:
            $ref: "#/components/schemas/Position"
        path_type:
          type: string
          description: Last mile data is road network or off road data.
          enum:
            - ROAD_PATH
            - OFF_GRID_PATH
      description: Add last mile information for exit directions to this POI. When
        both longitude and latitude are provided, the entry or exit will be
        saved correctly only.
    PoiSiteManager:
      type: object
      properties:
        entrance:
          type: array
          description: Add last mile information for entry directions to this POI. When
            both longitude and latitude are provided, the entry or exit will be
            saved correctly only.
          items:
            $ref: "#/components/schemas/PoiSiteInfo"
        exit:
          type: array
          description: Add last mile information for exit directions to this POI. When
            both longitude and latitude are provided, the entry or exit will be
            saved correctly only.
          items:
            $ref: "#/components/schemas/PoiSiteInfo"
      description: Last Mile Information
    Position:
