openapi: 3.0.1
info:
  title: NavPro API
  description: >
    Welcome to the NavPro API documentation. NavPro enables fleet operators and
    integration partners to manage drivers, trips, vehicles, and fleet assets
    programmatically — including driver invitation, GPS tracking, trip routing,
    document management, and more. By accessing or using the NavPro API, you are
    agreeing to the Trucker Path Terms of Service.


    Need help? Email us at: integrations@truckerpath.com


    # Release Note

    03/31/2026&emsp;&emsp;NavPro API is now live


    # API Versioning

    Current version: **v1** (stable). The base URL is
    `https://api.truckerpath.com/navpro`.


    Non-breaking additions (new optional fields, new endpoints) are introduced
    without a version bump.

    Breaking changes will be released under a new major version (e.g.,
    `/v2/...`) with advance notice.


    # Rate Limiting

    To ensure reliable service across all integration partners, we recommend
    keeping your request rate below **25 requests per second (QPS)** per client.
    Exceeding this threshold may result in degraded response times.


    If your integration requires higher throughput, please contact us at
    integrations@truckerpath.com.
  termsOfService: https://truckerpath.com/terms-of-service/
  version: "1.0"
servers:
  - url: https://api.truckerpath.com/navpro
    description: Production
tags:
  - name: 0. Drivers APIS
    description: The API allows partners to invite drivers to a network of NavPro
      operators and perform various operational behaviors.
  - name: 1. Vehicles APIS
    description: This API allows the NavPro Company to manage vehicles and their
      associations with drivers or loads.
  - name: 2. Tracking APIS
    description: Tracks the movement of a driver at a certain time.
  - name: 3. Document APIS
    description: Manage all documents within your company.
  - name: 4. Terminal APIS
    description: Create and manage different terminals to organize and group drivers.
  - name: 5. Users APIS
    description: Used for managing and retrieving all users under the company and
      their associated information.
  - name: 6. Poi APIS
    description: Manage your company's custom POIs and associated last-mile data
      through this API.
  - name: 7. Trip APIS
    description: Manage customized trip routes for fleet drivers.
  - name: 8. Routing Profile APIS
    description: Manage and retrieve truck routing profiles. A routing profile
      defines truck dimensions and weight constraints used for route
      calculation.
paths:
  /api/vehicle/update/status:
    post:
      tags:
        - 1. Vehicles APIS
      summary: Update Status
      description: Modify the status of the specified vehicle. Required information
        can be obtained through vehicle/query.
      operationId: updateVehicleStatus
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusVehicleInfo"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseVo"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseExample400"
        "401":
          description: Not Authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseExample401"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseExample403"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseExample404"
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseExample500"
      security:
        - Authorization: []
      x-code-samples:
        - source: >
            OkHttpClient client=new OkHttpClient().newBuilder()
              .build();
              MediaType mediaType=MediaType.parse("application/json");
              RequestBody body=RequestBody.create(mediaType,"{\"vehicle_id\": 12345,\"vehicle_status\": \"INACTIVE\" }");
              Request request=new Request.Builder()
              .url("https://api.truckerpath.com/navpro/api/vehicle/update/status")
              .method("POST",body)
              .addHeader("Authorization","Bearer {your_jwtToken}")
              .addHeader("Content-Type","application/json")
              .build();
              Response response=client.newCall(request).execute();
          lang: Java
        - source: >
            curl --location --request POST
            'https://api.truckerpath.com/navpro/api/vehicle/update/status' \

            --header 'Authorization: Bearer {your_jwtToken}' \

            --header 'Content-Type: application/json' \

            --data-raw '{
                          "vehicle_id": 12345,
                          "vehicle_status": "INACTIVE"
                        }'
          lang: CURL
        - source: >
            var request = require('request');

            var options = {
                'method': 'POST',
                'url': 'https://api.truckerpath.com/navpro/api/vehicle/update/status',
                'headers': {
                    'Authorization': 'Bearer {your_jwtToken}',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                        "vehicle_id": 12345,
                        "vehicle_status": "INACTIVE"
                    }
                )

            };

            request(options, function (error, response) {
                if (error) throw new Error(error);
                console.log(response.body);
            });
          lang: JavaScript
        - source: >
            package main


            import (
               "fmt"
               "strings"
               "net/http"
               "io/ioutil"
            )


            func main() {

               url := "https://api.truckerpath.com/navpro/api/vehicle/update/status"
               method := "POST"

               payload := strings.NewReader(`{
                                               "vehicle_id": 12345,
                                               "vehicle_status": "INACTIVE"
                                             }`)

               client := &http.Client {
               }
               req, err := http.NewRequest(method, url, payload)

               if err != nil {
                  fmt.Println(err)
                  return
               }
               req.Header.Add("Authorization", "Bearer {your_jwtToken}")
               req.Header.Add("Content-Type", "application/json")

               res, err := client.Do(req)
               if err != nil {
                  fmt.Println(err)
                  return
               }
               defer res.Body.Close()

               body, err := ioutil.ReadAll(res.Body)
               if err != nil {
                  fmt.Println(err)
                  return
               }
               fmt.Println(string(body))
            }
          lang: GO
