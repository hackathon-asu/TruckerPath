            package main


            import (
              "fmt"
              "bytes"
              "mime/multipart"
              "os"
              "path/filepath"
              "io"
              "net/http"
              "io/ioutil"
            )


            func main() {

              url := "https://api.truckerpath.com/navpro/api/document/add"
              method := "POST"

              payload := &bytes.Buffer{}
              writer := multipart.NewWriter(payload)
              file, errFile1 := os.Open("/xxx/your_file_location/Document.pdf")
              defer file.Close()
              part1,
                     errFile1 := writer.CreateFormFile("file",filepath.Base("/xxx/your_file_location"))
              _, errFile1 = io.Copy(part1, file)
              if errFile1 != nil {
                fmt.Println(errFile1)
                return
              }

              mimeHeader2 := make(map[string][]string)
              mimeHeader2["Content-Disposition"] = append(mimeHeader2["Content-Disposition"], "form-data; name=\"documentInfo\"")
              mimeHeader2["Content-Type"] = append(mimeHeader2["Content-Type"], "application/json")
              fieldWriter2, _ := writer.CreatePart(mimeHeader2)
              fieldWriter2.Write([]byte("{"document_type":"BILL_OF_LADING",
                                             "is_private": false,
                                             "link_to_customer": [
                                               14562
                                             ],
                                             "link_to_load": [
                                               39869
                                             ],
                                             "link_to_driver": [
                                               42933
                                             ],
                                             "link_to_vehicle": [
                                               38683
                                             ]
                                         }
            "))

              err := writer.Close()
              if err != nil {
                fmt.Println(err)
                return
              }


              client := &http.Client {
              }
              req, err := http.NewRequest(method, url, payload)

              if err != nil {
                fmt.Println(err)
                return
              }
              req.Header.Add("Authorization", "Bearer {your_jwtToken}")
              req.Header.Add("Content-Type", "multipart/form-data")

              req.Header.Set("Content-Type", writer.FormDataContentType())
              res, err := client.Do(req)
              if err != nil {
                fmt.Println(err)
                return
              }
              defer res.Body.Close()

              body, err := ioutil.ReadAll(res.Body)
              if err != nil {
                fmt.Println(err)
                return
              }
              fmt.Println(string(body))
            }
